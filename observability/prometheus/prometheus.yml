global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: remitly-app
    dns_sd_configs:
      - names:
          - app
        type: A
        port: 9091

  - job_name: traefik
    static_configs:
      - targets:
          - traefik:8082

  - job_name: postgres
    static_configs:
      - targets:
          - postgres-exporter:9187

  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: loki
    static_configs:
      - targets:
          - loki:3100

  - job_name: alloy
    static_configs:
      - targets:
          - alloy:12345

  - job_name: grafana
    static_configs:
      - targets:
          - grafana:3000
